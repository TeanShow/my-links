<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evgeniy | AI Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        .link-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }
        .link-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
        }
        .link-card i {
            font-size: 1.5rem;
            margin-right: 15px;
            width: 30px;
            color: #38bdf8;
        }
        .link-text { flex-grow: 1; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Evgenii</h1>
        <p>AI Engineer & LegalTech Developer</p>

        <a href="https://https://github.com/TeanShow/LexGuard-EU" class="link-card" target="_blank">
            <i class="fa-brands fa-github"></i>
            <span class="link-text">GitHub (Code)</span>
        </a>

        <a href="https://huggingface.co/spaces/твой-логин/LexGuard-EU" class="link-card" target="_blank">
            <i class="fa-solid fa-rocket"></i>
            <span class="link-text">Hugging Face (Live Demo)</span>
        </a>

        <a href="https://t.me/TeanShow" class="link-card" target="_blank">
            <i class="fa-brands fa-telegram"></i>
            <span class="link-text">Telegram (Direct Contact)</span>
        </a>

        <a href="https://instagram.com/tean.show" class="link-card" target="_blank">
            <i class="fa-brands fa-instagram"></i>
            <span class="link-text">Instagram (Personal)</span>
        </a>
    </div>

</body>
</html>
